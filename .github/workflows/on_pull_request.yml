name: Run on Pull Request

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

env:
  NODE_VERSION: 24
  PUBLIC_POSTHOG_KEY: ${{ secrets.PUBLIC_POSTHOG_KEY }}
  PUBLIC_POSTHOG_HOST: ${{ secrets.PUBLIC_POSTHOG_HOST }}

jobs:
  deploy-on-pr-changes:
    runs-on: depot-ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Install dependencies
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.0
          run_install: false
      - name: Install dependencies
        run: pnpm i

      # Run the build
      - name: Run build
        id: build
        env:
          ZE_SECRET_TOKEN: ${{ secrets.ZEPHYR_AUTH_TOKEN }}
        run: pnpm build

      - name: Zephyr deploy summary
        uses: ZephyrCloudIO/zephyr-preview-environment-action@44869db3cc99c42340f4469005ce837dd5248848 # main
        id: zephyr-summary
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
