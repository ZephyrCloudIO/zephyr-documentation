name: CI

on:
  push:
    branches:
      - main

env:
  NODE_VERSION: 24
  PUBLIC_POSTHOG_KEY: ${{ secrets.PUBLIC_POSTHOG_KEY }}
  PUBLIC_POSTHOG_HOST: ${{ secrets.PUBLIC_POSTHOG_HOST }}

jobs:
  build:
    runs-on: depot-ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      # Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Install dependencies
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.0
          run_install: false
      - name: Install dependencies
        run: pnpm i

      # Run Linting
      - name: Run linting
        run: pnpm lint

      # Run the build
      - name: Run build
        env:
          ZE_SECRET_TOKEN: ${{ secrets.ZEPHYR_AUTH_TOKEN }}
        run: pnpm build

      - name: Zephyr deploy summary
        uses: ZephyrCloudIO/zephyr-preview-environment-action@7d377d4a6a81e49320453eff916834fc55e28444 # main
        id: zephyr-summary
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
